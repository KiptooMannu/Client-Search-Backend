version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kazi-konnect-db
    environment:
      POSTGRES_USER: kazi_user
      POSTGRES_PASSWORD: KaziKonnect2024!
      POSTGRES_DB: kazi_konnect_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kazi_user -d kazi_konnect_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
