# ================================

# Direct Neon connection
spring.datasource.url=jdbc:postgresql://ep-calm-salad-amptoey4.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require

spring.datasource.username=neondb_owner
spring.datasource.password=npg_geuU41yzsKEZ
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# HIKARICP CONNECTION POOL
# ================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.initialization-fail-timeout=0

# SSL + optimization
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

# ================================
# JPA / HIBERNATE
# ================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate formatting
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent JDBC metadata timeout issues
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

