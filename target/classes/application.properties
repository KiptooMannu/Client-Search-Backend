# ================================
# DATABASE CONFIGURATION (NEON)
# ================================

# Direct Neon connection
spring.datasource.url=${DB_URL}

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# HIKARICP CONNECTION POOL
# ================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.initialization-fail-timeout=0

# SSL + optimization
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

# ================================
# JPA / HIBERNATE
# ================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate formatting
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent JDBC metadata timeout issues
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Global batch fetch size to resolve N+1 queries for lazy associations
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# ================================
# JWT CONFIGURATION
# ================================

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

# ================================
# SERVER CONFIGURATION
# ================================

server.port=8080
server.error.include-message=always

# ================================
# CLOUDINARY CONFIGURATION
# ================================

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ================================
# FILE UPLOAD LIMITS
# ================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ================================
# JACKSON DATE CONFIGURATION
# ================================

spring.jackson.serialization.write-dates-as-timestamps=false

# ================================
# M-PESA INTEGRATION
# ================================

# Environment: sandbox | production
mpesa.env=${MPESA_ENV:sandbox}

# Daraja API credentials (from Safaricom Developer Portal)
mpesa.consumer-key=${MPESA_CONSUMER_KEY}
mpesa.consumer-secret=${MPESA_CONSUMER_SECRET}

# Paybill or Till number
mpesa.shortcode=${MPESA_SHORTCODE}

# Lipa Na M-Pesa passkey (from the Business Portal)
mpesa.passkey=${MPESA_PASSKEY}

# ── Callback ──────────────────────────────────────────────────────
# Must be a publicly reachable HTTPS URL (use ngrok in dev)
mpesa.callback-url=${MPESA_CALLBACK_URL}

# Comma-separated Safaricom source IPs (leave blank to disable IP check)
# Get current list from: https://developer.safaricom.co.ke/APIs/IpWhitelisting
mpesa.callback-allowed-ips=${MPESA_CALLBACK_ALLOWED_IPS:196.201.214.200,196.201.214.206,196.201.213.100,196.201.213.114,196.201.216.169}

# Shared secret between your server and Safaricom portal (leave blank to disable)
mpesa.callback-secret=${MPESA_CALLBACK_SECRET:}

# ── B2C (Business to Customer — for worker payouts and refunds) ───
# Requires a separate B2C-enabled shortcode and Initiator credentials
mpesa.b2c-initiator-name=${MPESA_B2C_INITIATOR_NAME:}
mpesa.b2c-security-credential=${MPESA_B2C_SECURITY_CREDENTIAL:}
mpesa.b2c-result-url=${MPESA_B2C_RESULT_URL:}
mpesa.b2c-timeout-url=${MPESA_B2C_TIMEOUT_URL:}

# ================================
# ASYNC / SCHEDULING
# ================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.scheduling.pool.size=4

# Enable async processing and scheduling
spring.task.execution.thread-name-prefix=async-
spring.task.scheduling.thread-name-prefix=scheduler-

# ================================
# LOGGING (structured JSON recommended for production)
# ================================
logging.level.com.kazikonnect.backend.features.payment=INFO
logging.level.com.kazikonnect.backend.features.wallet=INFO

# ================================
# FLYWAY MIGRATION
# ================================
spring.flyway.baselineOnMigrate=true
spring.flyway.baselineVersion=1

# ================================
# EMAIL / SMTP CONFIGURATION
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_SMTP_USERNAME:}
spring.mail.password=${EMAIL_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# NOTE: Use a Google App Password for EMAIL_SMTP_PASSWORD, not your normal Google account password.

# ================================
# APPLICATION CONFIGURATION
# ================================
app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.email.from=${EMAIL_FROM:${EMAIL_SMTP_USERNAME:kkgg7241@gmail.com}}
app.email.tmp-dir=${EMAIL_TMP_DIR:/tmp}
