
spring.datasource.url=${DB_URL}

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.initialization-fail-timeout=-1

# SSL + optimization
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true


spring.flyway.enabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false


# Hibernate formatting
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent JDBC metadata timeout issues
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Global batch fetch size to resolve N+1 queries for lazy associations
spring.jpa.properties.hibernate.default_batch_fetch_size=100


app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}
server.port=8080
server.error.include-message=always

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB



spring.jackson.serialization.write-dates-as-timestamps=false



mpesa.env=${MPESA_ENV:sandbox}

mpesa.consumer-key=${MPESA_CONSUMER_KEY}
mpesa.consumer-secret=${MPESA_CONSUMER_SECRET}


mpesa.shortcode=${MPESA_SHORTCODE}


mpesa.passkey=${MPESA_PASSKEY}


mpesa.callback-url=${MPESA_CALLBACK_URL}

mpesa.callback-allowed-ips=${MPESA_CALLBACK_ALLOWED_IPS:196.201.212.69,196.201.212.200,196.201.213.100,196.201.213.114,196.201.214.200,196.201.214.206,196.201.216.169}


mpesa.callback-secret=${MPESA_CALLBACK_SECRET:}

mpesa.b2c-initiator-name=${MPESA_B2C_INITIATOR_NAME:}

# Admin seeding configuration
app.admin.email=${ADMIN_EMAIL}
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}
app.data-seed.enabled=${DATA_SEED_ENABLED:true}
mpesa.b2c-security-credential=${MPESA_B2C_SECURITY_CREDENTIAL:}
mpesa.security-credential=${MPESA_SECURITY_CREDENTIAL:${MPESA_B2C_SECURITY_CREDENTIAL:}}
mpesa.b2c-result-url=${MPESA_B2C_RESULT_URL:}
mpesa.b2c-timeout-url=${MPESA_B2C_TIMEOUT_URL:}

# B2C Payment Configuration
payment.b2c-max-retries=${PAYMENT_B2C_MAX_RETRIES:5}
payment.b2c-initial-backoff-minutes=${PAYMENT_B2C_INITIAL_BACKOFF_MINUTES:1}
payment.b2c-max-backoff-minutes=${PAYMENT_B2C_MAX_BACKOFF_MINUTES:1440}
payment.stk-push-timeout-minutes=${PAYMENT_STK_PUSH_TIMEOUT_MINUTES:15}
payment.platform-fee-percent=${PAYMENT_PLATFORM_FEE_PERCENT:10.0}

spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.scheduling.pool.size=4


spring.task.execution.thread-name-prefix=async-
spring.task.scheduling.thread-name-prefix=scheduler-


logging.level.com.kazikonnect.backend.features.payment=INFO
logging.level.com.kazikonnect.backend.features.wallet=INFO


spring.flyway.baselineOnMigrate=true
spring.flyway.baselineVersion=6
spring.flyway.validateOnMigrate=false
spring.flyway.out-of-order=false
spring.flyway.repair-on-migrate=true


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_SMTP_USERNAME:}
spring.mail.password=${EMAIL_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.email.from=${EMAIL_FROM:${EMAIL_SMTP_USERNAME:kkgg7241@gmail.com}}
app.email.tmp-dir=${EMAIL_TMP_DIR:/tmp}
